name: Reusable Promote

on:
  workflow_call:

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure develop exists
        shell: bash
        run: |
          git fetch origin main develop
          git rev-parse origin/develop >/dev/null

      - name: Open or refresh promotion PR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          EXISTING=$(gh pr list --base main --head develop --repo "${GITHUB_REPOSITORY}" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --repo "${GITHUB_REPOSITORY}" --title "Promote develop to main" --body "Automated promotion PR from \`develop\` to \`main\`."
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head develop \
              --title "Promote develop to main" \
              --body "Automated promotion PR from \`develop\` to \`main\`."
          fi
