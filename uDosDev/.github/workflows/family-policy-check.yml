name: Reusable Family Policy Check

on:
  workflow_call:

jobs:
  family-policy-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout governance repository
        uses: actions/checkout@v4
        with:
          repository: fredporter/uDOS-dev
          path: governance

      - name: Checkout contract repository
        uses: actions/checkout@v4
        with:
          repository: fredporter/uDOS-core
          path: core

      - name: Governance file checks
        run: governance/automation/check-repo-governance.sh "${GITHUB_REPOSITORY#*/}" "${GITHUB_WORKSPACE}"

      - name: GitHub metadata checks
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          DESCRIPTION=$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.description')
          DEFAULT_BRANCH=$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.default_branch')
          if [ -z "$DESCRIPTION" ] || [ "$DESCRIPTION" = "null" ]; then
            echo "Repository description is missing"
            exit 1
          fi
          if [ "$DEFAULT_BRANCH" != "main" ]; then
            echo "Default branch must remain main"
            exit 1
          fi

      - name: Contract enforcement checks
        run: core/scripts/run-contract-enforcement.sh "${GITHUB_REPOSITORY#*/}" "${GITHUB_WORKSPACE}"
