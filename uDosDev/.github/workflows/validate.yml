name: Reusable Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      governance_mode:
        required: true
        type: string

jobs:
  validate-local:
    if: ${{ github.event_name != 'workflow_call' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run dev checks
        run: bash scripts/run-dev-checks.sh

  validate:
    if: ${{ github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout governance repository
        uses: actions/checkout@v4
        with:
          repository: fredporter/uDOS-dev
          path: governance

      - name: Set up Python if needed
        if: ${{ hashFiles('pyproject.toml') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node if needed
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Governance checks
        run: governance/automation/check-repo-governance.sh "${GITHUB_REPOSITORY#*/}" "${GITHUB_WORKSPACE}"

      - name: Python validation
        if: ${{ hashFiles('pyproject.toml') != '' }}
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .
          if [ -d tests ] && find tests -type f | grep -q .; then
            pip install pytest jsonschema referencing
            python -m pytest
          fi

      - name: Node validation
        if: ${{ hashFiles('package.json') != '' }}
        shell: bash
        run: |
          npm install --package-lock=false
          npm test --if-present
