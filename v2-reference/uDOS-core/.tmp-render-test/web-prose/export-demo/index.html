<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Export Demo</title>
    <style>
      :root {
        --accent: #b84a2c;
        --background: #fff8ef;
        --foreground: #2b241f;
        --border: #ddc4a6;
      }
      body {
        margin: 0 auto;
        max-width: 760px;
        padding: 48px 20px 64px;
        background: var(--background);
        color: var(--foreground);
        font-family: Source Serif 4, serif;
        line-height: 1.7;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: Fraunces, serif;
        line-height: 1.15;
      }
      a {
        color: var(--accent);
      }
      .udos-meta {
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
        color: var(--accent);
        font: 12px "IBM Plex Sans", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="udos-meta">web-prose / public-sunset-prose</div>
