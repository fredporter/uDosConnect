<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>uDOS ThinUI — live demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/theme-fonts.css" />
    <link rel="stylesheet" href="/demo.css" />
  </head>
  <body>
    <div class="shell">
      <header class="top">
        <h1>uDOS ThinUI</h1>
        <p class="lede">
          Core → state packet → view registry → theme adapter → frame. Optional
          <code>?profile=ubuntu-gnome</code> loads the uDOS-surface profile (Classic Modern
          <code>udos-default</code> theme, windowed-friendly). CLI:
          <code>npm run demo -- --profile ubuntu-gnome</code>.
        </p>
        <div class="theme-row">
          <label>Theme</label>
          <select id="theme" aria-label="Theme">
            <option value="thinui-c64">thinui-c64</option>
            <option value="udos-default">udos-default (Classic Modern)</option>
            <option value="thinui-nes-sonic">thinui-nes-sonic</option>
            <option value="thinui-teletext">thinui-teletext</option>
            <option value="minimal-safe">minimal-safe</option>
          </select>
        </div>
        <div id="theme-loaded" class="theme-loaded" aria-live="polite"></div>
      </header>
      <section class="stage" id="stage">
        <div class="thinui-demo-screen">
          <div class="c64-stripe-loader" aria-hidden="true" title="C64-style load stripes"></div>
          <div class="c64-viewport">
            <div id="frame" class="frame" aria-live="polite" role="log"></div>
          </div>
        </div>
        <div id="actions" class="actions"></div>
        <div id="meta" class="meta"></div>
      </section>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
