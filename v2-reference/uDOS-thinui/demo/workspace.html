<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>uDOS ThinUI — unified workspace (demo)</title>
    <link rel="stylesheet" href="/workspace.css" />
  </head>
  <body>
    <div class="workspace-app" id="workspace-root">
      <aside class="ws-sidebar" aria-label="Workspace">
        <div class="ws-brand">
          <span class="ws-brand__mark">ThinUI</span>
          <span class="ws-brand__sub">unified workspace</span>
        </div>
        <div class="ws-binder">
          <div class="ws-binder__label">Binder</div>
          <div class="ws-binder__title" id="ws-binder-title">—</div>
          <div class="ws-binder__id ws-muted" id="ws-binder-id"></div>
        </div>
        <nav class="ws-modes" id="ws-modes" aria-label="View mode"></nav>
        <div class="ws-sidebar__foot ws-muted">
          Same objects · different lenses ·
          <a href="/index.html">runtime demo</a>
        </div>
      </aside>

      <div class="ws-column">
        <header class="ws-topbar">
          <div class="ws-topbar__context">
            <h1 class="ws-topbar__title" id="ws-mode-title">Workspace</h1>
            <p class="ws-topbar__hint ws-muted" id="ws-mode-blurb"></p>
          </div>
          <div class="ws-topbar__actions">
            <button type="button" class="ws-btn ws-btn--ghost" id="ws-cmd-search" title="Command palette (⌘K)">
              Search…
            </button>
            <button type="button" class="ws-btn" id="ws-toggle-drawer" aria-expanded="false">
              Detail
            </button>
            <button type="button" class="ws-btn ws-btn--secondary" id="ws-toggle-fullscreen" title="Fullscreen">
              Fullscreen
            </button>
          </div>
        </header>

        <div class="ws-work">
          <main class="ws-main" id="ws-main" aria-live="polite"></main>
          <aside class="ws-drawer" id="ws-drawer" hidden aria-hidden="true">
            <div class="ws-drawer__head">
              <h2 class="ws-drawer__title" id="ws-drawer-title">Detail</h2>
              <button type="button" class="ws-icon-btn" id="ws-drawer-close" aria-label="Close detail panel">
                ×
              </button>
            </div>
            <div class="ws-drawer__body" id="ws-drawer-body"></div>
          </aside>
        </div>
      </div>
    </div>

    <div class="ws-palette-backdrop" id="ws-palette-backdrop" hidden></div>
    <div class="ws-palette" id="ws-palette" role="dialog" aria-modal="true" aria-label="Command palette" hidden>
      <div class="ws-palette__field">
        <input
          type="search"
          id="ws-palette-input"
          class="ws-palette__input"
          placeholder="Jump to mode or item…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <ul class="ws-palette__list" id="ws-palette-list"></ul>
      <div class="ws-palette__hint ws-muted">Esc close · Enter select</div>
    </div>

    <script type="module" src="/workspace-main.ts"></script>
  </body>
</html>
