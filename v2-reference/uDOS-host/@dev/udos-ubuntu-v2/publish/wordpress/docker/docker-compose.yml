# transitional-compatibility: WordPress publish/demo only — not a tier-1 uDOS host service.
# Owner + sunset: uDOS-host/docs/docker-compose-compatibility.md
# Family registry: uDOS-dev/@dev/fixtures/shared-runtime-service-lifecycle.v1.json (ubuntu-wordpress-publish-stack)
services:
  wordpress:
    image: wordpress:6.8-php8.3-apache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wp
    volumes:
      - ./wp:/var/www/html
      - ../plugins:/var/www/html/wp-content/plugins/udos-local
      - ../themes:/var/www/html/wp-content/themes/udos-local
      - ../adapters:/var/www/html/wp-content/mu-plugins/udos-adapters
    restart: unless-stopped

  db:
    image: mariadb:11
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: wp
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  proxy:
    image: caddy:2
    profiles: ["proxy"]
    depends_on:
      - wordpress
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
