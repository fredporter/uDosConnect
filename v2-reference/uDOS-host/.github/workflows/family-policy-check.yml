# Lighter than the old reusable workflow: governance file layout + Core contract
# enforcement only (no extra `gh` repo-metadata gates). Runs on `main` only.
name: Family Policy Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout uDOS-dev (governance scripts)
        uses: actions/checkout@v4
        with:
          repository: fredporter/uDOS-dev
          path: governance

      - name: Checkout uDOS-core (contract enforcement)
        uses: actions/checkout@v4
        with:
          repository: fredporter/uDOS-core
          path: core

      - name: Repo governance files
        run: governance/automation/check-repo-governance.sh "${GITHUB_REPOSITORY#*/}" "${GITHUB_WORKSPACE}"

      - name: Contract enforcement
        run: core/scripts/run-contract-enforcement.sh "${GITHUB_REPOSITORY#*/}" "${GITHUB_WORKSPACE}"
