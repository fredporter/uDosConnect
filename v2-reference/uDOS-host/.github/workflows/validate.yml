# Primary CI for this repo: runs on `main` only (no `develop` line).
# Family governance still expects this filename — keep it as the integration anchor.
name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Ubuntu checks
        run: bash scripts/run-ubuntu-checks.sh

      - name: Verify command-centre HTTP
        run: bash scripts/verify-command-centre-http.sh
